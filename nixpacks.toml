[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.tokenizer",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.curl",
  "php82Extensions.openssl",
  "php82Extensions.gd",
  "composer"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php -S 0.0.0.0:$PORT -t public"
```

---

**File 2: `Procfile`** (one line)
```
web: php artisan migrate --force && php artisan storage:link && php -S 0.0.0.0:$PORT -t public
```

---

**File 3: `.gitignore`** — open your existing one and make sure this line is **commented out or removed**:
```
# /database/*.sqlite    ← add the # so the file gets committed to git
